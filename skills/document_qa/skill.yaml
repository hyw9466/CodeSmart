name: document_qa
display_name: 文档问答
version: "1.0.0"
description: |
  基于已上传的文档进行知识问答。当用户提出与文档内容相关的问题时使用此工具。

trigger:
  keywords:
    - 文档中
    - 根据文档
    - 知识库
    - 我上传的
    - 查阅文档
  patterns:
    - "文档.*提到"
    - "根据.*文档"

parameters:
  - name: query
    type: string
    description: 用户的具体问题
    required: true

llm:
  temperature: 0.3

system_prompt: |
  你是一位知识库问答专家。请基于提供的文档内容回答用户的问题。
  如果文档中没有相关信息，请明确告知用户。
  回答要准确、简洁，引用文档中的具体内容。

user_prompt: "{query}"