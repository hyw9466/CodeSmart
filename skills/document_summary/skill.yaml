name: document_summary
display_name: 文档总结
version: "1.0.0"
description: |
  对给定的文本内容进行总结摘要。当用户要求总结、概括文档内容时使用此工具。

trigger:
  keywords:
    - 总结
    - 概括
    - 摘要
    - 简述
  patterns:
    - "总结.*文本"
    - "概括.*内容"

parameters:
  - name: text
    type: string
    description: 需要总结的文本内容
    required: true

llm:
  temperature: 0.3

system_prompt: |
  你是一位文档总结专家。请对用户提供的文本进行简洁、准确的总结。
  总结要求：
  1. 保留核心信息和关键要点
  2. 语言简洁明了
  3. 结构清晰，可使用列表
  4. 如有必要，指出文档的主要结论

user_prompt: |
  请总结以下文本内容：
  {text}