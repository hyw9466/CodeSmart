services:
  code-analysis-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-analysis-assistant
    ports:
      - "8000:8000"
    environment:
      # 嵌入模型配置（阿里云 DashScope）
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - EMBEDDING_CONCURRENCY=${EMBEDDING_CONCURRENCY:-3}
      # 聊天模型配置（阿里云 DashScope）
      - LLM_MODEL=${LLM_MODEL:-qwen3.6-plus}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # Agent 配置
      - MEMORY_WINDOW_K=${MEMORY_WINDOW_K:-3}
    volumes:
      # 持久化向量索引（FAISS）- 仅挂载索引目录，避免覆盖 Python 模块
      - ./data/vectorstore:/app/vectorstore/faiss_index
      # 持久化上传文件
      - ./data/uploads:/app/uploads
      # 持久化对话历史
      - ./data/chat_history:/app/chat_history
      # Skill 插件目录（服务器上新增 Skill 后只需 restart，无需 rebuild）
      - ./skills:/app/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
